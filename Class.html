<body>
    <div id="mapid"></div>
    <style>
        #mapid{width:900px; height: 500px;}
    </style>
    <table id="ncTable">
  <tr>
    <th>Name</th>
    <th>Population</th>
  </tr>
</table>

    <script>

    var map = L.map("mapid").setView([35.77296841827961, -78.89973632725632], 8);
            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {}).addTo(map);

    
    function myFunction(e){
        console.log(e.target.feature.properties.NAME)
    }
    function onEachFeature(feature, layer) {
        layer.on({mouseover : myFunction})
        // if (feature.properties && feature.properties.NAME) {
        //     layer.bindPopup(features.properties.NAME)
        // }
    }

    L.geoJSON(nc, {
        onEachFeature: onEachFeature
    }).addTo(map)
    var myTable = document.getElementById("ncTable")
        function popTable(feature){
            var myRow = document.createElement("tr")
            var myCell1 = document.createElement("td")
            var myCell2 = document.createElement("td")
            var name = feature.properties.NAME
            var population = feature.properties.Total
            myCell1.innerHTML = name
            myCell2.innerHTML = population
            myRow.append(myCell1)
            myRow.append(myCell2)
            myTable.append(myRow)

        }
    nc.features.forEach(e => popTable(e))
        
        
    </script>
</body>
